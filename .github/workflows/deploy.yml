name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.8'
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run tests
        run: python manage.py test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/github_actions_ci
          chmod 600 ~/.ssh/github_actions_ci
          ssh-keyscan 80.78.254.40 >> ~/.ssh/known_hosts
      - name: Sync files
        run: |
          rsync -avz --delete \
            --exclude="db.sqlite3" \
            --exclude="venv/" \
            --exclude=".git/" \
            --exclude="*.pyc" \
            --exclude="__pycache__/" \
            ./ root@80.78.254.40:/home/django/projects/dj_140_CRUD/drf-intro/simple_crud/
      - name: Migrate
        run: |
          ssh -i ~/.ssh/github_actions_ci root@80.78.254.40 "cd /home/django/projects/dj_140_CRUD/drf-intro/simple_crud && source /home/django/projects/dj_140_CRUD/venv/bin/activate && python manage.py migrate --noinput"
