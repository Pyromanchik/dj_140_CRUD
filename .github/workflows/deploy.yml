name: Django CI/CD

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run migrations
      run: |
        python manage.py migrate --settings=simple_crud.settings

    - name: Run tests
      run: |
        python manage.py test --settings=simple_crud.settings

  deploy:
    needs: test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/github_actions_ci
        chmod 600 ~/.ssh/github_actions_ci
        ssh-keyscan 80.78.254.40 >> ~/.ssh/known_hosts

    - name: Sync files
      run: |
        rsync -avz --delete \
          --exclude="db.sqlite3" \
          --exclude=".venv/" \
          --exclude=".git/" \
          --exclude="*.pyc" \
          --exclude="__pycache__/" \
          ./ root@80.78.254.40:/home/django/projects/dj_140_CRUD/simple_crud/

    - name: Migrate on server
      run: |
        ssh -i ~/.ssh/github_actions_ci root@80.78.254.40 "cd /home/django/projects/dj_140_CRUD/simple_crud && source /home/django/projects/dj_140_CRUD/venv/bin/activate && python manage.py migrate --noinput"
